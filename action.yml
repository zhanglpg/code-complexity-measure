name: 'Complexity Accounting'
description: 'Measure Net Complexity Score and gate PRs on complexity thresholds'
inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  threshold:
    description: 'Hotspot cognitive complexity threshold'
    required: false
    default: '10'
  fail-above:
    description: 'Fail if NCS exceeds this value'
    required: false
    default: ''
  output-format:
    description: 'Output format: json or markdown'
    required: false
    default: 'markdown'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'false'
outputs:
  ncs:
    description: 'Net Complexity Score'
    value: ${{ steps.scan.outputs.ncs }}
  hotspot-count:
    description: 'Number of hotspot functions'
    value: ${{ steps.scan.outputs.hotspot_count }}
  pass:
    description: 'Whether the scan passed the threshold'
    value: ${{ steps.scan.outputs.pass }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install complexity-accounting
      shell: bash
      run: pip install ${{ github.action_path }}

    - name: Run scan
      id: scan
      shell: bash
      run: |
        ARGS="${{ inputs.path }} --json --threshold ${{ inputs.threshold }}"
        if [ -n "${{ inputs.fail-above }}" ]; then
          ARGS="$ARGS --fail-above ${{ inputs.fail-above }}"
        fi
        OUTPUT=$(complexity-accounting scan $ARGS 2>/dev/null || true)
        echo "$OUTPUT" > /tmp/complexity-report.json

        NCS=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['net_complexity_score'])" 2>/dev/null || echo "0")
        HOTSPOTS=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['hotspot_count'])" 2>/dev/null || echo "0")

        echo "ncs=$NCS" >> "$GITHUB_OUTPUT"
        echo "hotspot_count=$HOTSPOTS" >> "$GITHUB_OUTPUT"

        if [ -n "${{ inputs.fail-above }}" ]; then
          PASS=$(python3 -c "print('true' if float('$NCS') <= float('${{ inputs.fail-above }}') else 'false')")
        else
          PASS="true"
        fi
        echo "pass=$PASS" >> "$GITHUB_OUTPUT"

        if [ "$PASS" = "false" ]; then
          echo "::error::NCS $NCS exceeds threshold ${{ inputs.fail-above }}"
          exit 1
        fi

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        BODY=$(complexity-accounting compare \
          --base "${{ github.event.pull_request.base.sha }}" \
          --head "${{ github.sha }}" \
          --repo . --markdown 2>/dev/null || echo "⚠️ Could not generate comparison report")
        gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || true
