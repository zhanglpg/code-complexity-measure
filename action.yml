name: 'Complexity Accounting'
description: 'Measure Net Complexity Score and gate PRs on complexity thresholds. Reports on push and pull_request events with Job Summary and PR comments.'

branding:
  icon: 'bar-chart-2'
  color: 'orange'

inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  threshold:
    description: 'Hotspot cognitive complexity threshold'
    required: false
    default: '10'
  fail-above:
    description: 'Fail if NCS exceeds this value'
    required: false
    default: ''
  output-format:
    description: 'Output format: json or markdown'
    required: false
    default: 'markdown'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  post-comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'false'
  extras:
    description: 'Comma-separated language extras to install (e.g. go,java,cpp)'
    required: false
    default: ''
  update-comment:
    description: 'Update existing PR comment instead of creating a new one (true/false)'
    required: false
    default: 'true'

outputs:
  ncs:
    description: 'Net Complexity Score'
    value: ${{ steps.scan.outputs.ncs }}
  hotspot-count:
    description: 'Number of hotspot functions'
    value: ${{ steps.scan.outputs.hotspot_count }}
  pass:
    description: 'Whether the scan passed the threshold'
    value: ${{ steps.scan.outputs.pass }}
  delta:
    description: 'NCS delta from comparison (if available)'
    value: ${{ steps.compare.outputs.delta }}

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: complexity-pip-${{ inputs.python-version }}
        restore-keys: |
          complexity-pip-

    - name: Install complexity-accounting
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_EXTRAS: ${{ inputs.extras }}
      run: |
        if [ -n "${INPUT_EXTRAS}" ]; then
          pip install "${ACTION_PATH}[${INPUT_EXTRAS}]"
        else
          pip install "${ACTION_PATH}"
        fi

    - name: Run scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_FAIL_ABOVE: ${{ inputs.fail-above }}
      run: |
        set +e
        OUTPUT=$(complexity-accounting scan "${INPUT_PATH}" --json --threshold "${INPUT_THRESHOLD}" 2>/dev/null)
        SCAN_EXIT=$?
        set -e

        echo "${OUTPUT}" > /tmp/complexity-report.json

        NCS=$(echo "${OUTPUT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['net_complexity_score'])" 2>/dev/null || echo "0")
        HOTSPOTS=$(echo "${OUTPUT}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['summary']['hotspot_count'])" 2>/dev/null || echo "0")

        echo "ncs=${NCS}" >> "${GITHUB_OUTPUT}"
        echo "hotspot_count=${HOTSPOTS}" >> "${GITHUB_OUTPUT}"

        if [ -n "${INPUT_FAIL_ABOVE}" ]; then
          PASS=$(python3 -c "print('true' if float('${NCS}') <= float('${INPUT_FAIL_ABOVE}') else 'false')")
        else
          PASS="true"
        fi
        echo "pass=${PASS}" >> "${GITHUB_OUTPUT}"

    - name: Generate comparison report
      id: compare
      if: always() && steps.scan.outcome != 'cancelled'
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        CURRENT_SHA: ${{ github.sha }}
        INPUT_PATH: ${{ inputs.path }}
      run: |
        if [ "${EVENT_NAME}" = "pull_request" ]; then
          BASE_REF="${PR_BASE_SHA}"
        else
          BASE_REF="HEAD~1"
        fi

        set +e
        BODY=$(complexity-accounting compare \
          --base "${BASE_REF}" \
          --head "${CURRENT_SHA:-HEAD}" \
          --repo "${INPUT_PATH}" --markdown 2>/dev/null)
        COMPARE_EXIT=$?
        set -e

        if [ ${COMPARE_EXIT} -ne 0 ] || [ -z "${BODY}" ]; then
          BODY=""
          echo "delta=" >> "${GITHUB_OUTPUT}"
        else
          DELTA=$(complexity-accounting compare \
            --base "${BASE_REF}" \
            --head "${CURRENT_SHA:-HEAD}" \
            --repo "${INPUT_PATH}" --json 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(round(d.get('head_ncs',0) - d.get('base_ncs',0), 2))" 2>/dev/null || echo "")
          echo "delta=${DELTA}" >> "${GITHUB_OUTPUT}"
        fi

        # Save comparison body for comment and summary steps
        echo "${BODY}" > /tmp/complexity-compare.md

    - name: Write Job Summary
      if: always() && steps.scan.outcome != 'cancelled'
      shell: bash
      env:
        NCS: ${{ steps.scan.outputs.ncs }}
        HOTSPOTS: ${{ steps.scan.outputs.hotspot_count }}
        PASS: ${{ steps.scan.outputs.pass }}
        DELTA: ${{ steps.compare.outputs.delta }}
      run: |
        {
          echo "## Complexity Accounting Report"
          echo ""

          # Rating emoji
          RATING=""
          if python3 -c "exit(0 if float('${NCS}') <= 3 else 1)" 2>/dev/null; then
            RATING="Healthy"
          elif python3 -c "exit(0 if float('${NCS}') <= 6 else 1)" 2>/dev/null; then
            RATING="Moderate"
          elif python3 -c "exit(0 if float('${NCS}') <= 10 else 1)" 2>/dev/null; then
            RATING="Concerning"
          else
            RATING="Critical"
          fi

          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| **Net Complexity Score** | ${NCS} (${RATING}) |"
          echo "| **Hotspot Count** | ${HOTSPOTS} |"
          echo "| **Pass** | ${PASS} |"
          if [ -n "${DELTA}" ]; then
            echo "| **NCS Delta** | ${DELTA} |"
          fi
          echo ""

          # Append comparison report if available
          COMPARE_BODY=$(cat /tmp/complexity-compare.md 2>/dev/null || echo "")
          if [ -n "${COMPARE_BODY}" ]; then
            echo "### Comparison"
            echo ""
            echo "${COMPARE_BODY}"
          fi
        } >> "${GITHUB_STEP_SUMMARY}"

    - name: Post or update PR comment
      if: always() && inputs.post-comment == 'true' && github.event_name == 'pull_request' && steps.scan.outcome != 'cancelled'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        UPDATE_COMMENT: ${{ inputs.update-comment }}
        NCS: ${{ steps.scan.outputs.ncs }}
        HOTSPOTS: ${{ steps.scan.outputs.hotspot_count }}
        PASS: ${{ steps.scan.outputs.pass }}
      run: |
        MARKER="<!-- complexity-accounting-report -->"

        COMPARE_BODY=$(cat /tmp/complexity-compare.md 2>/dev/null || echo "")

        BODY="${MARKER}
        ## Complexity Accounting Report

        | Metric | Value |
        |--------|-------|
        | **Net Complexity Score** | ${NCS} |
        | **Hotspot Count** | ${HOTSPOTS} |
        | **Pass** | ${PASS} |
        "

        if [ -n "${COMPARE_BODY}" ]; then
          BODY="${BODY}

        ### Comparison

        ${COMPARE_BODY}"
        fi

        if [ "${UPDATE_COMMENT}" = "true" ]; then
          # Find existing comment with our marker
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [ -n "${COMMENT_ID}" ]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="${BODY}" > /dev/null
          else
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi
        else
          gh pr comment "${PR_NUMBER}" --body "${BODY}"
        fi

    - name: Fail if threshold exceeded
      if: always() && steps.scan.outcome != 'cancelled'
      shell: bash
      env:
        PASS: ${{ steps.scan.outputs.pass }}
        NCS: ${{ steps.scan.outputs.ncs }}
        INPUT_FAIL_ABOVE: ${{ inputs.fail-above }}
      run: |
        if [ "${PASS}" = "false" ]; then
          echo "::error::NCS ${NCS} exceeds threshold ${INPUT_FAIL_ABOVE}"
          exit 1
        fi
